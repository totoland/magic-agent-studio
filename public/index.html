<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  :root, [data-theme="dark"] {
    --bg: #14110e;
    --surface-1: #1a1613;
    --surface-2: #221d19;
    --surface-3: #2c2620;
    --border: rgba(255,255,255,0.075);
    --text: #ece7e1;
    --muted: #9d958b;
    --faint: #6c645b;
    --idle: #837b71;
    --running: #f5a623;
    --success: #34d399;
    --error: #f87171;
    --accent: #6366f1;
    --accent-fg: #a5a9ff;
    --hover: rgba(255,255,255,.06);
    --hover2: rgba(255,255,255,.105);
    --scrollbar: rgba(255,255,255,.09);
    --scrollbar-h: rgba(255,255,255,.17);
    --shadow: 0 16px 50px rgba(0,0,0,.5);
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --ui: 'Geist', system-ui, sans-serif;
  }
  [data-theme="light"] {
    --bg: #f3f1ec;
    --surface-1: #ffffff;
    --surface-2: #f0ede7;
    --surface-3: #ffffff;
    --border: rgba(34,27,20,0.11);
    --text: #221d18;
    --muted: #6d635a;
    --faint: #a89e92;
    --idle: #a89e92;
    --running: #d97706;
    --success: #059669;
    --error: #dc2626;
    --accent: #6366f1;
    --accent-fg: #4f46e5;
    --hover: rgba(34,24,15,.045);
    --hover2: rgba(34,24,15,.075);
    --scrollbar: rgba(34,24,15,.16);
    --scrollbar-h: rgba(34,24,15,.28);
    --shadow: 0 16px 44px rgba(60,45,30,.16);
  }
  html.theme-anim, html.theme-anim * {
    transition: background-color .42s ease, border-color .42s ease, color .3s ease, fill .3s ease, box-shadow .42s ease !important;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); }
  body { font-family: var(--ui); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  .font-mono, code, textarea, input[class*="font-mono"] { font-family: var(--mono); }

  /* thin scrollbars */
  .scroll-thin::-webkit-scrollbar { width: 9px; height: 9px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-h); background-clip: padding-box; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }

  /* animations */
  @keyframes pingSoft { 0% { transform: scale(1); opacity: .6; } 80%,100% { transform: scale(2.4); opacity: 0; } }
  .animate-ping-soft { animation: pingSoft 1.6s cubic-bezier(0,0,.2,1) infinite; }
  @keyframes eventIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .event-in { animation: eventIn .34s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes menuPop { from { opacity: 0; transform: translateY(-4px) scale(.97); } to { opacity: 1; transform: none; } }
  .menu-pop { animation: menuPop .14s ease-out both; transform-origin: top; }
  @keyframes modalPop { from { opacity: 0; transform: translateY(10px) scale(.97); } to { opacity: 1; transform: none; } }
  .modal-pop { animation: modalPop .2s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .overlay-in { animation: overlayIn .16s ease-out both; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .toast-in { animation: toastIn .26s cubic-bezier(.2,.7,.2,1) both; }

  /* density */
  [data-density="compact"] { font-size: 13.5px; }
  [data-density="comfy"] { font-size: 14px; }

  ::selection { background: color-mix(in srgb, var(--accent) 40%, transparent); }
  textarea, input { caret-color: var(--accent); }

  /* rendered markdown (agent result blocks) */
  .md-body { font-size: 13px; line-height: 1.65; color: var(--text); word-break: break-word; }
  .md-body > :first-child { margin-top: 0; }
  .md-body > :last-child { margin-bottom: 0; }
  .md-body h1, .md-body h2, .md-body h3, .md-body h4 { font-weight: 600; line-height: 1.3; margin: 1em 0 .45em; color: var(--text); }
  .md-body h1 { font-size: 1.35em; } .md-body h2 { font-size: 1.18em; } .md-body h3 { font-size: 1.05em; } .md-body h4 { font-size: 1em; }
  .md-body p { margin: .5em 0; }
  .md-body ul, .md-body ol { margin: .5em 0; padding-left: 1.4em; }
  .md-body ul { list-style: disc; } .md-body ol { list-style: decimal; }
  .md-body li { margin: .2em 0; }
  .md-body strong { font-weight: 600; color: var(--text); }
  .md-body em { font-style: italic; }
  .md-body code { font-family: var(--mono); background: var(--surface-3); padding: 1px 5px; border-radius: 5px; font-size: .9em; color: var(--accent-fg); }
  .md-body pre { background: var(--surface-3); padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: .6em 0; }
  .md-body pre code { background: none; padding: 0; color: var(--text); }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: .9em 0; }
  .md-body a { color: var(--accent-fg); text-decoration: underline; }
  .md-body blockquote { border-left: 3px solid var(--border); margin: .6em 0; padding-left: .8em; color: var(--muted); }
  .md-body table { border-collapse: collapse; width: 100%; margin: .6em 0; font-size: .92em; display: block; overflow-x: auto; }
  .md-body th, .md-body td { border: 1px solid var(--border); padding: 5px 9px; text-align: left; }
  .md-body th { background: var(--surface-3); font-weight: 600; }
</style>
</head>
